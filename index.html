// ===== 媒体別集客実績シート =====
// 5 チャネル (チラシ / HPB / メタ広告 / MAP / スレッズ) について
// 期間×店舗ごとに「予算」と「集客数」を表示。メタ広告は Meta CSV から自動集計し、
// それ以外は手入力で保存する。
function getChannelManualEntry(month, clinic, channel) {
  return (state.channelEntries || []).find(
    e => e.month === month && e.clinic === clinic && e.channel === channel,
  );
}
function setChannelManualEntry(month, clinic, channel, patch) {
  state.channelEntries = state.channelEntries || [];
  let e = getChannelManualEntry(month, clinic, channel);
  if (!e) {
    e = { month, clinic, channel, budget: 0, customers: 0 };
    state.channelEntries.push(e);
  }
  if (patch.budget !== undefined) e.budget = Math.max(0, Number(patch.budget) || 0);
  if (patch.customers !== undefined) e.customers = Math.max(0, Number(patch.customers) || 0);
  save();
}
// Meta CSV を 月×店舗×チャネル('meta') の {budget, customers} 形に集計
function aggregateMetaByMonthClinic(fromMonth, toMonth) {
  const out = {}; // key: month__clinic
  // fromMonth/toMonth は YYYY-MM-DD。日単位の厳密比較を行う。
  (state.metaRows || []).forEach(r => {
    if (!r.date) return;
    const ym = r.date.slice(0, 7);
    if (fromMonth && r.date < fromMonth) return;
    if (toMonth && r.date > toMonth) return;
    const cl = getMetaClinicFromCampaign(r.campaign);
    if (!cl) return;
    const k = `${ym}__${cl}`;
    if (!out[k]) out[k] = { budget: 0, customers: 0 };
    out[k].budget += r.amountSpent || 0;
    out[k].customers += r.registrations || 0;
  });
  return out;
}
function getChannelValue(month, clinic, channel, metaAgg) {
  if (channel === 'meta') {
    return metaAgg[`${month}__${clinic}`] || { budget: 0, customers: 0, fromMeta: true };
  }
  const e = getChannelManualEntry(month, clinic, channel);
  return e ? { budget: e.budget, customers: e.customers } : { budget: 0, customers: 0 };
}
function listMonthsInRange(fromMonth, toMonth) {
  if (!fromMonth || !toMonth) {
    // fallback: this year
    const y = new Date().getFullYear();
    return Array.from({ length: 12 }, (_, i) => `${y}-${pad2(i + 1)}`);
  }
  const out = [];
  const [fy, fm] = fromMonth.split('-').map(Number);
  const [ty, tm] = toMonth.split('-').map(Number);
  let y = fy, m = fm;
  while (y < ty || (y === ty && m <= tm)) {
    out.push(`${y}-${pad2(m)}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}

function viewRevenueTrend() {
  const clinicFilter = document.getElementById('clinicSelect').value;
  const { from, to } = getPeriodRange();
  const months = listMonthsInRange(from, to);
  const metaAgg = aggregateMetaByMonthClinic(from, to);
  const targetClinics = clinicFilter === 'all' ? Object.keys(CLINICS) : [clinicFilter];

  // 当月選択時にハイライトするための判定（from と to が同じ月の範囲内なら単一月）
  const fromYM = from ? from.slice(0, 7) : '';
  const toYM = to ? to.slice(0, 7) : '';
  const selectedSingleMonth = (fromYM && fromYM === toYM) ? fromYM : null;
  const today = new Date();
  const todayYM = ymOf(today);
  const lastMonthYM = ymOf(addMonths(today, -1));
  const displayYear = selectedSingleMonth
    ? Number(selectedSingleMonth.slice(0, 4))
    : (_revenueTrendYearOverride ?? today.getFullYear());

  // 期間合計サマリー (5チャネル × 表示対象店舗合算)
  const channelTotals = {};
  ACQUISITION_CHANNELS.forEach(c => channelTotals[c.key] = { budget: 0, customers: 0 });
  months.forEach(m => {
    targetClinics.forEach(cl => {
      ACQUISITION_CHANNELS.forEach(c => {
        const v = getChannelValue(m, cl, c.key, metaAgg);
        channelTotals[c.key].budget += v.budget;
        channelTotals[c.key].customers += v.customers;
      });
    });
  });
  const grandBudget = Object.values(channelTotals).reduce((s, v) => s + v.budget, 0);
  const grandCustomers = Object.values(channelTotals).reduce((s, v) => s + v.customers, 0);
  const grandCpa = grandCustomers > 0 ? Math.round(grandBudget / grandCustomers) : 0;

  const clinicLabel = clinicFilter === 'all' ? '全店舗合算' : CLINICS[clinicFilter];
  const periodLabel = months.length === 1 ? months[0] : `${months[0]} 〜 ${months[months.length - 1]}`;

  const summaryCards = ACQUISITION_CHANNELS.map(c => {
    const t = channelTotals[c.key];
    const cpa = t.customers > 0 ? Math.round(t.budget / t.customers) : 0;
    const isMeta = !c.manual;
    return `<div class="kpi-card" style="${isMeta ? 'background:#eff6ff;' : ''}">
      <div class="kpi-label">${c.icon} ${c.label}${isMeta ? ' <span style="font-size:10px; color:var(--primary); background:#dbeafe; padding:1px 5px; border-radius:3px;">Meta連携</span>' : ''}</div>
      <div style="font-size:13px; color:var(--muted); margin-top:6px;">予算</div>
      <div style="font-weight:700; color:var(--text-dark);">${yen(t.budget)}</div>
      <div style="font-size:13px; color:var(--muted); margin-top:6px;">集客</div>
      <div style="font-weight:700; color:var(--text-dark);">${fmt(t.customers)} <span style="font-size:11px; color:var(--muted);">名</span></div>
      <div style="font-size:13px; color:var(--muted); margin-top:6px;">CPA</div>
      <div style="font-weight:700; color:${cpa > 0 ? 'var(--text-dark)' : 'var(--muted)'};">${t.customers > 0 ? yen(cpa) : '—'}</div>
    </div>`;
  }).join('');

  // 月次内訳テーブル：行=月（×店舗 'all'時）、列=媒体（予算/集客）
  const rows = [];
  months.forEach(m => {
    targetClinics.forEach(cl => {
      rows.push({ month: m, clinic: cl });
    });
  });

  const tableHtml = rows.length === 0 ? '<div class="empty">期間を選択してください。</div>' : `
    <div style="overflow-x:auto;">
    <table style="min-width:100%; font-size:13px;">
      <thead>
        <tr style="background:#f8fafc;">
          <th rowspan="2" style="position:sticky; left:0; background:#f8fafc; z-index:1;">年月</th>
          ${clinicFilter === 'all' ? '<th rowspan="2">店舗</th>' : ''}
          ${ACQUISITION_CHANNELS.map(c => `<th colspan="3" style="text-align:center; ${c.manual ? '' : 'background:#eff6ff;'}">${c.icon} ${c.label}${c.manual ? '' : ' <span style="font-size:9px;">📡</span>'}</th>`).join('')}

function setRevenueTrendMonth(ym) {
  document.getElementById('periodSelect').value = 'custom';

  const toYMD = endOfMonthYMD(ym);
  document.getElementById('fromMonth').value = fromYMD;
  document.getElementById('toMonth').value = toYMD;

  if (fromTrigger) fromTrigger.textContent = formatYMD(fromYMD);

  renderView();
}

// 媒体別集客実績 ビューの年間合計（1月〜12月）
function setRevenueTrendYear(year) {
  const sel = document.getElementById('periodSelect');
  const opt = Array.from(sel.options).find(o => o.value === `year:${year}`);
  if (opt) {
    sel.value = `year:${year}`;
  } else {
    sel.value = 'custom';
    const fromYMD = `${year}-01-01`, toYMD = `${year}-12-31`;
    document.getElementById('fromMonth').value = fromYMD;
    document.getElementById('toMonth').value = toYMD;
    const fromTrigger = document.getElementById('fromMonthTrigger');
    const toTrigger = document.getElementById('toMonthTrigger');
    if (fromTrigger) fromTrigger.textContent = formatYMD(fromYMD);
    if (toTrigger) toTrigger.textContent = formatYMD(toYMD);
  }
  renderView();
}

// 媒体別集客実績 ビュー: 年送り（選択月のみ年シフト、未選択なら現在表示年からシフト）
let _revenueTrendYearOverride = null;
function shiftRevenueTrendYear(delta) {
  const { from, to } = getPeriodRange();
  const baseYear = (from && to && from === to)
    ? Number(from.slice(0, 4))
    : (_revenueTrendYearOverride ?? new Date().getFullYear());
  const newYear = baseYear + delta;
  if (from && to && from === to) {
    const mm = from.slice(5);
    setRevenueTrendMonth(`${newYear}-${mm}`);
  } else {
    _revenueTrendYearOverride = newYear;
    renderView();
  }
}

  const metaAgg = aggregateMetaByMonthClinic(from, to);

  // 期間×店舗合算で各チャネルの 予算/予約数 を集計
  const totals = {};
  ACQUISITION_CHANNELS.forEach(c => totals[c.key] = { budget: 0, customers: 0 });
  months.forEach(m => {
    targetClinics.forEach(cl => {
      ACQUISITION_CHANNELS.forEach(c => {
        const v = getChannelValue(m, cl, c.key, metaAgg);

        totals[c.key].customers += v.customers;
      });
    });
  });

  // 訴求価格（チャネル単位、手入力で保存）
  state.channelPricing = state.channelPricing || {};

  const cards = ACQUISITION_CHANNELS.map(c => {
    const t = totals[c.key];
    const cpa = t.customers > 0 ? Math.round(t.budget / t.customers) : 0;
    const price = state.channelPricing[c.key] != null ? state.channelPricing[c.key] : '';
    const isMeta = !c.manual;
    return `
      <div class="kpi-card" style="${isMeta ? 'background:#eff6ff;' : ''}; padding:14px 16px;">
        <div style="display:flex; align-items:center; gap:6px; margin-bottom:10px;">

          <strong style="font-size:14px;">${c.label}</strong>
          ${isMeta ? '<span style="font-size:9px; color:var(--primary); background:#dbeafe; padding:1px 5px; border-radius:3px;">Meta連携</span>' : ''}
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
          <div>
            <div style="font-size:11px; color:var(--muted);">予算金額</div>
            <div style="font-weight:700; font-size:15px;">${yen(t.budget)}</div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--muted);">予約数</div>
            <div style="font-weight:700; font-size:15px;">${fmt(t.customers)} <span style="font-size:11px; color:var(--muted);">名</span></div>
          </div>
          <div>
            <div style="font-size:11px; color:var(--muted);">CPA</div>
            <div style="font-weight:700; font-size:15px; color:${cpa > 0 ? 'var(--text-dark)' : 'var(--muted)'};">${cpa > 0 ? yen(cpa) : '—'}</div>

          </div>
        </div>
      </div>`;
  }).join('');

  // 合計
  const grand = Object.values(totals).reduce((a, t) => ({ budget: a.budget + t.budget, customers: a.customers + t.customers }), { budget: 0, customers: 0 });

// マスタ管理のパスワードゲート（メモリのみ、リロードで再ロック）
let masterUnlocked = false;
function setMasterPassword(pw) {
  if (!pw) { alert('パスワードを入力してください'); return; }
  state.masterPassword = pw;
  save();
  masterUnlocked = true;
  alert('マスタ管理のパスワードを設定しました。');
  renderView();
}
function unlockMaster() {
  const input = document.getElementById('master-pw-input');
  if (!input) return;
  if (input.value === state.masterPassword) {
    masterUnlocked = true;
    renderView();
  } else {
    alert('パスワードが正しくありません');
    input.value = '';
    input.focus();
  }
}
function lockMaster() { masterUnlocked = false; selectedClinicEdit = null; renderView(); }
function changeMasterPassword() {
  const cur = prompt('現在のパスワードを入力してください');
  if (cur === null) return;
  if (cur !== state.masterPassword) { alert('現在のパスワードが正しくありません'); return; }
  const next = prompt('新しいパスワードを入力してください');
  if (next === null || !next) return;
  state.masterPassword = next;
  save();
  alert('パスワードを変更しました。');
}
function clearMasterPassword() {
  const cur = prompt('現在のパスワードを入力してください');
  if (cur === null) return;
  if (cur !== state.masterPassword) { alert('パスワードが正しくありません'); return; }
  if (!confirm('マスタ管理のパスワード保護を解除しますか？')) return;
  state.masterPassword = '';
  save();
  masterUnlocked = false;
  renderView();
}

function getClinicDetails(key) {
  state.clinicDetails = state.clinicDetails || {};
  const d = state.clinicDetails[key] || {};
  // 旧構造（phone/address/password/notes）からの移行と既定値の補完
  d.phone = d.phone || '';
  d.address = d.address || '';
  // セラピストは配列管理。旧構造（文字列、改行区切り）からの自動マイグレーション。
  if (typeof d.therapists === 'string') {
    d.therapists = d.therapists.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  }
  if (!Array.isArray(d.therapists)) d.therapists = [];
  d.credentials = d.credentials || {};
  ['hpb', 'sattou', 'camera'].forEach(svc => {
    d.credentials[svc] = d.credentials[svc] || { id: '', password: '' };
  });
  state.clinicDetails[key] = d;
  return d;
}
function updateClinicDetail(key, field, value) {
  const d = getClinicDetails(key);
  d[field] = value;
  save();
}
function updateClinicCredential(key, svc, field, value) {
  const d = getClinicDetails(key);
  d.credentials[svc] = d.credentials[svc] || { id: '', password: '' };
  d.credentials[svc][field] = value;
  save();
}
function updateClinicTherapist(key, idx, value) {
  const d = getClinicDetails(key);
  if (idx < 0 || idx >= d.therapists.length) return;
  d.therapists[idx] = value;
  save();
}
function addClinicTherapist(key) {
  const d = getClinicDetails(key);
  d.therapists.push('');
  save();
  renderView();
  // 新しい入力欄にフォーカス
  setTimeout(() => {
    const inputs = document.querySelectorAll('input[data-therapist-input]');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 0);
}
function removeClinicTherapist(key, idx) {
  const d = getClinicDetails(key);
  d.therapists.splice(idx, 1);
  save();
  renderView();
}

function viewClinics() {
  // パスワード設定済 & 未解除 → ゲート画面

    return `<div class="card" style="max-width:480px; margin:40px auto; text-align:center;">

function toggleAllClinicPasswords(btn) {
  const inputs = document.querySelectorAll('input[data-pass-input]');
  if (!inputs.length) return;
  const currentlyHidden = Array.from(inputs).some(i => i.type === 'password');
  const newType = currentlyHidden ? 'text' : 'password';
  inputs.forEach(i => { i.type = newType; });
  if (btn) btn.textContent = newType === 'text' ? '🙈 PASS を隠す' : '👁 PASS を表示';
}

// ===== Reservation Calendar =====
function switchCalClinic(clinic) { state.calClinic = clinic; save(); renderView(); }
function switchCalView(view) { state.calView = view; save(); renderView(); }
function shiftCalMonth(delta) {
  const [y, m] = state.calMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.calMonth = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;
  save(); renderView();
}
function shiftCalWeek(days) {
  state.calWeekStart = ymdShift(state.calWeekStart, days);
  save(); renderView();
}
function jumpToStaffDay(date) {
  state.staffViewDate = date;
  state.staffViewClinic = state.calClinic;
  save();
  switchView('staff');
}
function bookingsOn(date, staffId) {
  return state.bookings.filter(b => b.date === date && b.staffId === staffId && b.type !== '休憩' && b.type !== 'MTG');
}
function getMonthDays(yyyymm) {
  const [y, m] = yyyymm.split('-').map(Number);
  const first = new Date(y, m - 1, 1);
  const last = new Date(y, m, 0);
  // Monday-first: Mon=0, Tue=1, ..., Sun=6
  const startDay = (first.getDay() + 6) % 7;
  const cells = [];
  for (let i = 0; i < startDay; i++) {
    const dd = new Date(y, m - 1, 1 - (startDay - i));
    cells.push({ date: ymd(dd), inMonth: false });
  }
  for (let d = 1; d <= last.getDate(); d++) {
    cells.push({ date: `${y}-${pad2(m)}-${pad2(d)}`, inMonth: true });
  }
  while (cells.length % 7 !== 0) {
    const lastCell = cells[cells.length - 1].date;
    const d = new Date(lastCell);
    d.setDate(d.getDate() + 1);
    cells.push({ date: ymd(d), inMonth: false });
  }
  return cells;
}
function ymd(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`; }
function getWeekDays(startYmd) {
  const d = new Date(startYmd);
  // Monday-first: how many days back to Monday (Sun→6, Mon→0, Tue→1, ..., Sat→5)
  const daysBack = (d.getDay() + 6) % 7;
  const monday = new Date(d);
  monday.setDate(d.getDate() - daysBack);
  return Array.from({ length: 7 }, (_, i) => {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    return ymd(dd);
  });
}
function jpDate(ymdStr) {
  const d = new Date(ymdStr);
  return `${d.getMonth() + 1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`;
}

function shiftKey(staffId, date) { return `${staffId}__${date}`; }
function getShift(staffId, date) {
  return (state.shifts && state.shifts[shiftKey(staffId, date)]) || '出勤';
}
function setShift(staffId, date, status) {
  if (status === '休み') {
    const existing = state.bookings.filter(b => b.staffId === staffId && b.date === date && b.type === '施術');
    if (existing.length > 0) {
      const staffName = (findStaff(staffId) || {}).name || staffId;
      if (!confirm(`⚠️ ${staffName} の ${date} には既に ${existing.length} 件の施術予約があります。\nそれでも「休み」に変更しますか？\n（既存の予約はそのまま残ります）`)) {
        return;
      }
    }
  }
  state.shifts[shiftKey(staffId, date)] = status;
  save();
  renderView();
}
function getBookingsForStaffDate(staffId, date) {
  return state.bookings.filter(b => b.staffId === staffId && b.date === date)
    .sort((a, b) => a.time.localeCompare(b.time));
}
function slotIndex(time) { return TIME_SLOTS.indexOf(time); }
function bookingAtSlot(staffId, date, time) {
  const idx = slotIndex(time);
  return state.bookings.find(b => {
    if (b.staffId !== staffId || b.date !== date) return false;
    const start = slotIndex(b.time);
    const span = Math.max(1, Math.round((b.durationMin || 60) / 30));
    return idx >= start && idx < start + span;
  });
}
function isSlotStart(staffId, date, time, b) {
  return b && b.time === time;
}

function jumpToStaffDayInClinic(date, clinic) {
  state.staffViewDate = date;
  state.staffViewClinic = clinic;
  state.staffViewMode = 'day';
  save();
  renderView();
}

function ymdShift(ymd, days) {
  const d = new Date(ymd);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function renderScheduleGrid(staffList, date, opts) {
  if (staffList.length === 0) return '<div class="empty">スタッフがいません</div>';
  const slotWidth = 90;
  const labelWidth = 140;
  const cols = `${labelWidth}px repeat(${TIME_SLOTS.length}, ${slotWidth}px)`;
  let html = `<div class="schedule-wrap"><div class="schedule-grid" style="grid-template-columns: ${cols};">`;
  // header row
  html += `<div class="head staff-label">スタッフ</div>`;
  html += TIME_SLOTS.map(t => `<div class="head time-head">${t}</div>`).join('');
  // staff rows
  staffList.forEach(s => {
    const shift = getShift(s.id, date);
    const shiftColor = shift === '休み' ? 'var(--danger)' : shift === '半休' ? 'var(--warning)' : 'var(--success)';
    html += `<div class="staff-label"><div class="name">${s.name}</div><div class="sub">${s.role} / <span style="color:${shiftColor};">${shift}</span></div></div>`;
    const isOff = shift === '休み';
    const covered = new Set();
    TIME_SLOTS.forEach((time, slotIdx) => {
      if (covered.has(slotIdx)) return;
      // is there a booking that STARTS exactly here?
      const b = state.bookings.find(x => x.staffId === s.id && x.date === date && x.time === time);
      if (b) {
        const span = Math.min(
          Math.max(1, Math.round((b.durationMin || 60) / 30)),
          TIME_SLOTS.length - slotIdx
        );
        for (let i = 0; i < span; i++) covered.add(slotIdx + i);
        const endTime = TIME_SLOTS[Math.min(slotIdx + span, TIME_SLOTS.length - 1)] || '';
        let typeCls, inner, titleText;
        if (b.type === '休憩') {
          typeCls = 'break';
          inner = `<div class="booking-name">☕ 休憩</div><div class="booking-time">${b.time}〜${endTime} (${b.durationMin || 30}分)</div>`;
          titleText = '休憩 ' + b.time + '-' + endTime + (b.notes ? ' / ' + b.notes : '');
        } else if (b.type === 'MTG') {
          typeCls = 'mtg';
          inner = `<div class="booking-name">👥 MTG</div><div class="booking-time">${b.time}〜${endTime} (${b.durationMin || 60}分)</div>${b.notes ? `<div class="booking-menu">${escapeHtml(b.notes)}</div>` : ''}`;
          titleText = 'MTG ' + b.time + '-' + endTime + (b.notes ? ' / ' + b.notes : '');
        } else {
          typeCls = 'booked ' + menuClass(b.menu);
          inner = `<div class="booking-name">${escapeHtml(b.customer || '施術')}</div>${b.menu ? `<div class="booking-menu">${escapeHtml(b.menu)}</div>` : ''}<div class="booking-time">${b.time}〜${endTime}</div>`;
          titleText = (b.customer || '施術') + (b.menu ? ' / ' + b.menu : '') + ' (' + b.time + '-' + endTime + ')';
        }
        const conflictCls = isOff ? ' conflict' : '';
        const conflictTitle = isOff ? `\n⚠ このスタッフはこの日が「休み」設定です` : '';
        html += `<div class="slot ${typeCls}${conflictCls}" style="grid-column: span ${span};" onclick="openBookingModal('${s.id}','${date}','${b.time}','${b.id}')" title="${titleText}${conflictTitle}">${inner}</div>`;
      } else if (isOff) {
        html += `<div class="slot off">—</div>`;
      } else {
        html += `<div class="slot" onclick="openBookingModal('${s.id}','${date}','${time}')"></div>`;
      }
    });
  });
  html += `</div></div>`;
  if (opts && opts.showLegend === false) return html;
  html += `<div style="margin-top:10px; font-size:11px; color:var(--muted); display:flex; gap:12px; flex-wrap:wrap;">
    <strong style="color:var(--text);">メニュー:</strong>
    <span><span style="display:inline-block; width:12px; height:12px; background:#e0f2fe; border-left:3px solid #0284c7; vertical-align:middle;"></span> NAORUプラン</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:#d1fae5; border-left:3px solid #10b981; vertical-align:middle;"></span> ボディーケア30分</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:#fce7f3; border-left:3px solid #ec4899; vertical-align:middle;"></span> ボディーケア60分</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:#fef9c3; border-left:3px solid #ca8a04; vertical-align:middle;"></span> ボディーケア90分</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:#f3e8ff; border-left:3px solid #a855f7; vertical-align:middle;"></span> メンテナンス</span>
    <span style="border-left:1px solid var(--border); padding-left:10px;"><span style="display:inline-block; width:12px; height:12px; background:repeating-linear-gradient(135deg, #fff7ed, #fff7ed 2px, #ffedd5 2px, #ffedd5 4px); border-left:3px solid var(--warning); vertical-align:middle;"></span> 🟠 休憩</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:repeating-linear-gradient(135deg, #ede9fe, #ede9fe 2px, #ddd6fe 2px, #ddd6fe 4px); border-left:3px solid #8b5cf6; vertical-align:middle;"></span> 🟣 MTG</span>
    <span><span style="display:inline-block; width:12px; height:12px; background:repeating-linear-gradient(45deg, #fafbfc, #fafbfc 3px, #f3f4f6 3px, #f3f4f6 6px); vertical-align:middle;"></span> 休み</span>
  </div>`;
  return html;
}

// ===== Booking modal =====
function setBookingType(type) {
  document.querySelectorAll('input[name="bk_type"]').forEach(r => { r.checked = r.value === type; });
  toggleBookingType();
}
function toggleBookingType() {
  const type = document.querySelector('input[name="bk_type"]:checked').value;
  const isTreatment = type === '施術';
  document.getElementById('bk_customerField').style.display = isTreatment ? '' : 'none';
  document.getElementById('bk_menuField').style.display = isTreatment ? '' : 'none';
  document.getElementById('bookingModalTitle').textContent =
    (document.getElementById('bk_id').value ? '編集' : '追加') + ': ' + type;
  // sensible defaults when creating new
  if (!document.getElementById('bk_id').value) {
    if (type === '休憩') document.getElementById('bk_duration').value = '30';
    else if (type === 'MTG') document.getElementById('bk_duration').value = '60';
  }
}
function onMenuChange() {
  const menu = document.getElementById('bk_menu').value;
  const map = { 'ボディーケア30分': '30', 'ボディーケア60分': '60', 'ボディーケア90分': '90' };
  if (map[menu]) document.getElementById('bk_duration').value = map[menu];
}

// ----- Customer autocomplete in booking modal -----
function filterCustomerSuggestions() {
  const q = document.getElementById('bk_customer').value.toLowerCase().trim();
  const all = state.customers || [];
  const filtered = q
    ? all.filter(c =>
        (c.name || '').toLowerCase().includes(q) ||
        (c.kana || '').toLowerCase().includes(q) ||
        (c.phone || '').includes(q))
    : all;
  const dropdown = document.getElementById('bk_customerSuggestions');
  if (!dropdown) return;
  if (filtered.length === 0) {
    dropdown.innerHTML = all.length === 0
      ? `<div class="cs-empty">顧客データがありません<br /><span style="font-size:11px;">「設定 → 顧客データ移行」からCSVをアップロードしてください</span></div>`
      : `<div class="cs-empty">該当する顧客はありません</div>`;
  } else {
    dropdown.innerHTML = filtered.slice(0, 30).map(c => `
      <div class="cs-item" data-name="${escapeHtml(c.name || '')}">
        <div class="name">${escapeHtml(c.name || '-')}</div>
        <div class="sub">${escapeHtml(c.kana || '')}${c.phone ? ' / ☎ ' + escapeHtml(c.phone) : ''}${c.firstVisit ? ' / 初回 ' + escapeHtml(c.firstVisit) : ''}</div>
      </div>
    `).join('');
    dropdown.querySelectorAll('.cs-item').forEach(el => {
      el.addEventListener('mousedown', (e) => {
        e.preventDefault();
        document.getElementById('bk_customer').value = el.dataset.name;
        dropdown.classList.remove('show');
      });
    });
  }
  dropdown.classList.add('show');
}
document.addEventListener('click', (e) => {
  const wrap = document.getElementById('bk_customerField');
  const dropdown = document.getElementById('bk_customerSuggestions');
  if (wrap && dropdown && !wrap.contains(e.target)) dropdown.classList.remove('show');
});

function openBookingModal(staffId, date, time, bookingId) {
  const clinic = state.staffViewClinic;
  const staffList = STAFF[clinic] || [];
  const modal = document.getElementById('bookingModal');

  // populate time select
  const timeSel = document.getElementById('bk_time');
  timeSel.innerHTML = TIME_SLOTS.map(t => `<option value="${t}">${t}</option>`).join('');

  if (bookingId) {
    const b = state.bookings.find(x => x.id === bookingId);
    if (!b) return;
    document.getElementById('bk_id').value = b.id;
    document.getElementById('bk_staffId').value = b.staffId;
    document.getElementById('bk_staffLabel').textContent = (staffList.find(s => s.id === b.staffId) || {}).name || b.staffId;
    document.getElementById('bk_date').value = b.date;
    document.getElementById('bk_time').value = b.time;
    document.getElementById('bk_duration').value = b.durationMin || 60;
    document.getElementById('bk_customer').value = b.customer || '';
    document.getElementById('bk_menu').value = b.menu || '';
    document.getElementById('bk_notes').value = b.notes || '';
    document.getElementById('bk_deleteBtn').style.display = '';
    // Backward compat: old data may have type='予約' — treat as '施術'
    const t = b.type === '予約' ? '施術' : (b.type || '施術');
    setBookingType(t);
  } else {
    document.getElementById('bk_id').value = '';
    if (!staffId && staffList[0]) staffId = staffList[0].id;
    document.getElementById('bk_staffId').value = staffId;
    document.getElementById('bk_staffLabel').innerHTML = `
      <select id="bk_staffSelect" style="width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px;">
        ${staffList.map(s => `<option value="${s.id}" ${s.id === staffId ? 'selected' : ''}>${s.name}</option>`).join('')}
      </select>`;
    document.getElementById('bk_date').value = date || state.staffViewDate;
    document.getElementById('bk_time').value = time || TIME_SLOTS[0];
    document.getElementById('bk_duration').value = '60';
    document.getElementById('bk_customer').value = '';
    document.getElementById('bk_menu').value = '';
    document.getElementById('bk_notes').value = '';
    document.getElementById('bk_deleteBtn').style.display = 'none';
    setBookingType('施術');
  }
  modal.classList.add('show');
}
function closeBookingModal() { document.getElementById('bookingModal').classList.remove('show'); }

function saveBooking() {
  const id = document.getElementById('bk_id').value || ('bk_' + Date.now() + '_' + Math.floor(Math.random() * 1000));
  const staffSel = document.getElementById('bk_staffSelect');
  const staffId = staffSel ? staffSel.value : document.getElementById('bk_staffId').value;
  const type = document.querySelector('input[name="bk_type"]:checked').value;
  const booking = {
    id,
    type,
    staffId,
    clinic: state.staffViewClinic,
    date: document.getElementById('bk_date').value,
    time: document.getElementById('bk_time').value,
    durationMin: Number(document.getElementById('bk_duration').value) || 60,
    customer: type === '施術' ? document.getElementById('bk_customer').value.trim() : '',
    menu: type === '施術' ? document.getElementById('bk_menu').value.trim() : '',
    notes: document.getElementById('bk_notes').value.trim(),
  };
  if (!booking.date || !booking.time) { alert('日付と時刻は必須です'); return; }

  // Block additions on a 休み day; warn on 半休
  const shift = getShift(booking.staffId, booking.date);
  const staff = findStaff(booking.staffId);
  const staffName = staff ? staff.name : booking.staffId;
  if (shift === '休み') {
    alert(`⚠️ ${staffName} は ${booking.date} が「休み」に設定されています。\n\n勤怠表でその日を「出勤」に変更するか、別の日・別のスタッフへ変更してください。`);
    return;
  }
  if (shift === '半休') {
    if (!confirm(`⚠️ ${staffName} は ${booking.date} が「半休」に設定されています。\nこのまま登録しますか？`)) return;
  }

  const idx = state.bookings.findIndex(b => b.id === id);
  if (idx >= 0) state.bookings[idx] = booking;
  else state.bookings.push(booking);
  save();
  closeBookingModal();
  renderView();
}
function deleteBooking() {
  const id = document.getElementById('bk_id').value;
  if (!id) return;
  if (!confirm('この予約を削除しますか？')) return;
  state.bookings = state.bookings.filter(b => b.id !== id);
  save();
  closeBookingModal();
  renderView();
}
function viewStaffAttendance() {
  const month = state.attendanceMonth;
  const [y, m] = month.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  const days = Array.from({ length: lastDay }, (_, i) => i + 1);
  const today = ymd(new Date());
  const cols = `220px repeat(${lastDay}, 52px) 100px`;

  const renderStaffRow = (s, clinicName) => {
    let offCount = 0;
    let cellsHtml = '';
    days.forEach(d => {
      const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
      const shift = getShift(s.id, dateStr);
      const cls = shift === '休み' ? 'off' : shift === '半休' ? 'half' : 'on';
      const label = shift === '休み' ? '休' : shift === '半休' ? '半' : '◯';
      if (shift === '休み') offCount++;
      else if (shift === '半休') offCount += 0.5;
      cellsHtml += `<div class="att-cell ${cls}" onclick="cycleShift('${s.id}','${dateStr}')" title="${shift} (クリックで変更)">${label}</div>`;
    });
    const offStr = Number.isInteger(offCount) ? offCount : offCount.toFixed(1);
    return `
      <div class="name" onclick="openBulkShiftModal('${s.id}')" title="クリックで一括設定">
        <div>${s.name}</div>
        <div style="font-size:10px; color:var(--muted); font-weight:500;">${clinicName.replace('NAORU整体 ', '')} / ${s.role}</div>
      </div>
      ${cellsHtml}
      <div class="att-total">${offStr}日</div>
    `;
  };

  let body = '';
  Object.entries(STAFF).forEach(([clinicKey, list]) => {
    body += `<div class="att-clinic-label">🏥 ${CLINICS[clinicKey]}</div>`;
    body += `<div class="att-wrap"><div class="att-grid" style="grid-template-columns:${cols};">`;
    body += `<div class="head" style="background:#fafbfc;">スタッフ</div>`;
    days.forEach(d => {
      const date = new Date(y, m - 1, d);
      const dow = date.getDay();
      const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
      const isToday = dateStr === today;
      const cls = (isToday ? 'today' : '') + ' ' + (dow === 0 ? 'sun' : dow === 6 ? 'sat' : '');
      body += `<div class="head ${cls.trim()}">${d}<br /><span style="font-weight:normal; font-size:10px;">${['日','月','火','水','木','金','土'][dow]}</span></div>`;
    });
    body += `<div class="head" style="background:#fef3c7;">休日<br /><span style="font-weight:normal; font-size:10px;">合計</span></div>`;
    list.forEach(s => { body += renderStaffRow(s, CLINICS[clinicKey]); });
    body += `</div></div>`;
  });

  return `
    <div class="card" style="margin-bottom:18px;">
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <h2 style="margin:0;">📋 スタッフ勤怠表（全スタッフ）</h2>
        <div style="flex:1;"></div>
        <button class="ghost" onclick="shiftAttendanceMonth(-1)">← 前月</button>
        <div style="font-weight:700; font-size:16px; min-width:130px; text-align:center;">${y}年 ${m}月</div>
        <button class="ghost" onclick="shiftAttendanceMonth(1)">翌月 →</button>
        <button class="ghost" onclick="state.attendanceMonth='${ymOf(new Date())}'; save(); renderView();">今月</button>
      </div>
      <div style="margin-top:10px; font-size:12px; color:var(--muted); display:flex; gap:18px; flex-wrap:wrap;">
        <span><span class="att-cell on" style="display:inline-flex; width:24px; height:18px; vertical-align:middle;">◯</span> 出勤</span>
        <span><span class="att-cell half" style="display:inline-flex; width:24px; height:18px; vertical-align:middle;">半</span> 半休</span>
        <span><span class="att-cell off" style="display:inline-flex; width:24px; height:18px; vertical-align:middle;">休</span> 休み</span>
        <span style="margin-left:auto;">💡 セルをクリックで「出勤 → 休み → 半休」と切替</span>
      </div>
    </div>
    <div class="card">
      ${body}
    </div>
  `;
}

function shiftAttendanceMonth(delta) {
  const [y, m] = state.attendanceMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  state.attendanceMonth = `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`;
  save();
  renderView();
}

function cycleShift(staffId, date) {
  const current = getShift(staffId, date);
  const next = current === '出勤' ? '休み' : current === '休み' ? '半休' : '出勤';
  setShift(staffId, date, next);
}

// ===== Bulk shift modal =====
function findStaff(staffId) {
  for (const list of Object.values(STAFF)) {
    const s = list.find(x => x.id === staffId);
    if (s) return s;
  }
  return null;
}
function openBulkShiftModal(staffId) {
  const s = findStaff(staffId);
  if (!s) return;
  const [y, m] = state.attendanceMonth.split('-').map(Number);
  document.getElementById('bulkShiftTitle').textContent = `${s.name} の勤怠を一括設定（${y}年 ${m}月）`;
  document.getElementById('bulkShiftStaffId').value = staffId;
  // reset checkboxes
  [0,1,2,3,4,5,6].forEach(i => { const el = document.getElementById('bulk_dow_' + i); if (el) el.checked = false; });
  document.getElementById('bulk_status').value = '休み';
  document.getElementById('bulkShiftModal').classList.add('show');
}
function closeBulkShiftModal() {
  document.getElementById('bulkShiftModal').classList.remove('show');
}
function applyBulkAllMonth(status) {
  const staffId = document.getElementById('bulkShiftStaffId').value;
  if (!staffId) return;
  const [y, m] = state.attendanceMonth.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  for (let d = 1; d <= lastDay; d++) {
    const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
    state.shifts[shiftKey(staffId, dateStr)] = status;
  }
  save();
  closeBulkShiftModal();
  renderView();
}
function applyBulkWeekdays() {
  const staffId = document.getElementById('bulkShiftStaffId').value;
  if (!staffId) return;
  const status = document.getElementById('bulk_status').value;
  const selectedDows = [];
  [0,1,2,3,4,5,6].forEach(i => {
    if (document.getElementById('bulk_dow_' + i).checked) selectedDows.push(i);
  });
  if (selectedDows.length === 0) { alert('適用する曜日を選択してください'); return; }
  const [y, m] = state.attendanceMonth.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  let count = 0;
  for (let d = 1; d <= lastDay; d++) {
    const date = new Date(y, m - 1, d);
    if (selectedDows.includes(date.getDay())) {
      const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;
      state.shifts[shiftKey(staffId, dateStr)] = status;
      count++;
    }
  }
  save();
  closeBulkShiftModal();
  renderView();
}
function resetBulkShift() {
  const staffId = document.getElementById('bulkShiftStaffId').value;
  if (!staffId) return;
  if (!confirm('今月の勤怠設定をすべて解除しますか？\n（デフォルトの「出勤」に戻ります）')) return;
  const [y, m] = state.attendanceMonth.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  for (let d = 1; d <= lastDay; d++) {
    const dateStr = `${y}-${pad2(m)}-${pad2(d)}`;

  }
  save();
  closeBulkShiftModal();
  renderView();
}

function handleCustomerCsv(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    let text;
    try {
      // try UTF-8 first
      text = new TextDecoder('utf-8', { fatal: true }).decode(e.target.result);
    } catch {
      // fallback to Shift-JIS
      text = new TextDecoder('shift-jis').decode(e.target.result);
    }
    const rows = parseCsv(text);
    if (rows.length < 2) { alert('データが見つかりませんでした'); return; }
    const headers = rows[0];
    const mapped = rows.slice(1).map(row => mapCustomerRow(headers, row, file.name));
    if (!state.customers) state.customers = [];
    state.customers = state.customers.concat(mapped);
    save();
    document.getElementById('csvResult').innerHTML = `<div class="note">✓ ${mapped.length} 件の顧客データを取り込みました</div>`;
    setTimeout(() => renderView(), 800);
  };
  reader.readAsArrayBuffer(file);
}

function parseCsv(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') { inQuotes = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else { field += c; }
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows.filter(r => r.some(c => c && c.trim()));
}

function findCol(headers, ...names) {
  for (const n of names) {
    const idx = headers.findIndex(h => h && h.trim().toLowerCase().includes(n.toLowerCase()));
    if (idx >= 0) return idx;
  }
  return -1;
}
function valByNames(headers, row, ...names) {
  const idx = findCol(headers, ...names);
  return idx >= 0 ? (row[idx] || '').trim() : '';
}

function mapReservationRow(headers, row, sourceFile) {
  const date = valByNames(headers, row, '予約日', '来店日', '日付', 'date');
  const time = valByNames(headers, row, '予約時間', '時間', 'time');
  return {
    datetime: (date + ' ' + time).trim(),
    customer: valByNames(headers, row, '顧客', '氏名', '名前', 'お名前', 'name'),
    menu: valByNames(headers, row, 'メニュー', 'コース', 'menu', '施術'),
    staff: valByNames(headers, row, '担当', 'スタッフ', 'staff'),
    status: valByNames(headers, row, 'ステータス', '状態', 'status') || '予約済',
    source: sourceFile,
  };
}

function parseSquareAmount(s) {
  if (s === undefined || s === null) return 0;
  // Square exports like "¥3,300", "$33.00", "-¥110", "3300"
  const cleaned = String(s).replace(/[¥$,\s]/g, '').trim();
  const n = Number(cleaned);
  return isNaN(n) ? 0 : n;
}

function detectClinicFromLocation(loc) {
  if (!loc) return '';
  const l = loc.toLowerCase();
  if (l.includes('中百舌鳥') || l.includes('nakamozu')) return 'nakamozu';
  if (l.includes('天満') || l.includes('天六') || l.includes('tenroku') || l.includes('tenma')) return 'tenrokuten';
  return '';
}

function mapSaleRow(headers, row, sourceFile) {
  // Square CSV: prefer Net Sales (after discounts, before fees), fall back to Gross / Total
  const netSales   = valByNames(headers, row, 'Net Sales', '純売上');
  const grossSales = valByNames(headers, row, 'Gross Sales', '総売上');
  const total      = valByNames(headers, row, 'Total Collected', '合計徴収', '合計', '売上', '金額', 'amount', 'total', '会計');
  const fee        = valByNames(headers, row, 'Fee', '手数料');
  const tax        = valByNames(headers, row, 'Tax', '税金', '消費税');
  const amountStr  = netSales || grossSales || total;
  if (!amountStr) return null;

  return {
    date: valByNames(headers, row, 'Date', '日付', '取引日', '会計日', 'date'),
    time: valByNames(headers, row, 'Time', '時刻'),
    amount: parseSquareAmount(amountStr),
    grossAmount: parseSquareAmount(grossSales || total || netSales),
    fee: parseSquareAmount(fee),
    tax: parseSquareAmount(tax),
    menu: valByNames(headers, row, 'Item', 'メニュー', '商品', '品目', 'Description', '説明'),
    staff: valByNames(headers, row, 'Staff Name', '担当', 'スタッフ', 'staff'),
    customer: valByNames(headers, row, 'Customer Name', '顧客名', '顧客', '氏名', '名前', 'customer'),
    location: valByNames(headers, row, 'Location', 'ロケーション', '店舗'),
    clinic: detectClinicFromLocation(valByNames(headers, row, 'Location', 'ロケーション', '店舗')),
    transactionId: valByNames(headers, row, 'Transaction ID', 'Payment ID', '取引ID'),
    paymentMethod: valByNames(headers, row, 'Card Brand', 'Source', 'カード', '支払方法'),
    source: sourceFile,
  };
}

function mapCustomerRow(headers, row, sourceFile) {
  return {
    name: valByNames(headers, row, '氏名', '名前', 'name', 'お名前'),
    kana: valByNames(headers, row, 'かな', 'カナ', 'フリガナ', 'kana'),
    phone: valByNames(headers, row, '電話', 'tel', 'phone', '携帯'),
    email: valByNames(headers, row, 'メール', 'mail', 'email', 'e-mail'),
    firstVisit: valByNames(headers, row, '初回', '初診', '登録日', 'first'),
    source: sourceFile,
  };
}

function genericCsvImport(fileEvent, mapper, targetField, onDone) {
  const file = fileEvent.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let text;
    try { text = new TextDecoder('utf-8', { fatal: true }).decode(e.target.result); }
    catch { text = new TextDecoder('shift-jis').decode(e.target.result); }
    const rows = parseCsv(text);
    if (rows.length < 2) { alert('データが見つかりませんでした'); return; }
    const mapped = rows.slice(1).map(row => mapper(rows[0], row, file.name)).filter(r => r);
    if (!state[targetField]) state[targetField] = [];
    state[targetField] = state[targetField].concat(mapped);
    save();
    onDone(mapped.length);
  };
  reader.readAsArrayBuffer(file);
}

}
function handleSaleCsv(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let text;
    try { text = new TextDecoder('utf-8', { fatal: true }).decode(e.target.result); }
    catch { text = new TextDecoder('shift-jis').decode(e.target.result); }
    const rows = parseCsv(text);
    if (rows.length < 2) { alert('データが見つかりませんでした'); return; }
    const mapped = rows.slice(1).map(row => mapSaleRow(rows[0], row, file.name)).filter(r => r);
    if (!state.sales) state.sales = [];
    // Dedup by Square transaction ID when available
    const existingIds = new Set(state.sales.filter(s => s.transactionId).map(s => s.transactionId));
    const toAdd = mapped.filter(s => !s.transactionId || !existingIds.has(s.transactionId));
    const skipped = mapped.length - toAdd.length;
    state.sales = state.sales.concat(toAdd);
    save();
    const totalFee = toAdd.reduce((s, x) => s + (x.fee || 0), 0);
    const totalGross = toAdd.reduce((s, x) => s + (x.grossAmount || 0), 0);
    document.getElementById('csvResult').innerHTML =
      `<div class="note">✓ ${toAdd.length} 件取り込みました（重複スキップ: ${skipped} 件）<br />
       総売上: ${yen(totalGross)} / Square手数料: ${yen(totalFee)}</div>`;
    setTimeout(() => renderView(), 800);
  };
  reader.readAsArrayBuffer(file);
}

function aggregateSalesToMonthly() {
  if (!state.sales || state.sales.length === 0) { alert('取り込み済の売上明細がありません'); return; }
  if (!confirm('売上明細を月次に集計し、月次売上に反映します。\n店舗はSquareの Location 列から自動判定します。\n判定できない明細は除外されます。よろしいですか？')) return;

  // Group by month + clinic
  const byKey = {}; // key = `${month}__${clinic}`
  let skipped = 0;
  state.sales.forEach(s => {
    if (!s.date) { skipped++; return; }
    const ym = s.date.slice(0, 7).replace(/\//g, '-');
    if (!/^\d{4}-\d{2}$/.test(ym)) { skipped++; return; }
    if (!s.clinic) { skipped++; return; }
    const k = `${ym}__${s.clinic}`;
    byKey[k] = (byKey[k] || 0) + s.amount;
  });

  Object.entries(byKey).forEach(([k, total]) => {
    const [month, clinic] = k.split('__');
    const existing = state.entries.find(e => e.month === month && e.clinic === clinic);
    if (existing) { existing.revenue = total; }
    else {
      state.entries.push({
        month, clinic, revenue: total, adspend: 0,
        newCustomers: 0, repeatVisits: 0, reservations: 0, channel: 'other',
      });
    }
  });
  state.entries.sort((a,b) => a.month.localeCompare(b.month));
  save();
  alert(`${Object.keys(byKey).length} 件の(月×店舗)を月次売上に反映しました\n店舗未判定でスキップ: ${skipped} 件`);
  renderView();
}

  a.click();
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) throw new Error('invalid format');
      state = data; save(); renderView(); alert('インポートしました');
    } catch(err) { alert('読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
}
function loadSample() {
  if (state.entries.length > 0 && !confirm('既存データを上書きします。よろしいですか？')) return;
  const months = ['2025-10','2025-11','2025-12','2026-01','2026-02','2026-03','2026-04','2026-05'];
  const sample = [];
  const buildRow = (m, clinic, base) => {
    const total = base + Math.floor(Math.random() * 100000);
    const square = Math.floor(total * 0.55);
    const cash   = Math.floor(total * 0.25);
    const hpb    = Math.floor(total * 0.12);
    const other  = total - square - cash - hpb;
    return {
      month: m, clinic,
      revenueCash: cash, revenueSquare: square, revenueHpb: hpb, revenueOther: other,
      revenue: cash + square + hpb + other,
    };
  };
  months.forEach((m, i) => {
    sample.push({
      ...buildRow(m, 'nakamozu', 1200000 + i * 50000),
      adspend: 180000 + Math.floor(Math.random()*40000),
      newCustomers: 28 + Math.floor(Math.random()*10),
      repeatVisits: 95 + i * 5,
      reservations: 150 + i * 8,
      channel: ['google','meta','hotpepper'][i % 3],
    });
    sample.push({
      ...buildRow(m, 'tenrokuten', 980000 + i * 40000),
      adspend: 150000 + Math.floor(Math.random()*30000),
      newCustomers: 22 + Math.floor(Math.random()*8),
      repeatVisits: 75 + i * 4,
      reservations: 120 + i * 6,
      channel: ['meta','google','referral'][i % 3],
    });
  });
  state.entries = sample; save(); renderView();
}

// ===== Init =====
function initApp() {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.addEventListener('click', () => switchView(el.dataset.view));
  });
  document.getElementById('clinicSelect').addEventListener('change', renderView);
  document.getElementById('periodSelect').addEventListener('change', renderView);
  document.getElementById('fromMonth').addEventListener('change', () => {
    document.getElementById('periodSelect').value = 'custom'; renderView();
  });
  document.getElementById('toMonth').addEventListener('change', () => {
    document.getElementById('periodSelect').value = 'custom'; renderView();
  });
  load();
  applyNavCollapse();
  switchView('summary');
}

const wasAuthed = checkAuth();
if (wasAuthed) initApp();

// hook login form to init app after successful login
const originalShowApp = showApp;
showApp = function() {
  originalShowApp();
  if (!window.__appInited) { initApp(); window.__appInited = true; }
};
if (wasAuthed) window.__appInited = true;
</script>
