<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NAORU整体 経営ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --sidebar: #ffffff;
    --sidebar-hover: #f3f4f6;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --text: #1f2937;
    --muted: #6b7280;
    --muted-2: #9ca3af;
    --border: #e5e7eb;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  .app { display: flex; min-height: 100vh; }

  /* ----- Sidebar ----- */
  .sidebar {
    width: 240px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    flex-shrink: 0;
    overflow-y: auto;
    position: sticky;
    top: 0;
    max-height: 100vh;
  }
  .sidebar-header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header .logo { font-size: 15px; font-weight: 700; color: var(--text); }
  .sidebar-header .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .nav-group { padding: 12px 0 4px; }
  .nav-group-title {
    padding: 4px 20px;
    font-size: 11px;
    color: var(--muted-2);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    border-left: 3px solid transparent;
    user-select: none;
  }
  .nav-item:hover { background: var(--sidebar-hover); }
  .nav-item.active {
    background: #eff6ff;
    border-left-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
  }
  .nav-item .icon { font-size: 16px; width: 18px; text-align: center; }
  .nav-item .badge-sm {
    margin-left: auto;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 999px;
    background: #fef3c7;
    color: #92400e;
  }

  /* ----- Main ----- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .topbar h1 { margin: 0; font-size: 18px; font-weight: 600; }
  .topbar .crumb { color: var(--muted); font-size: 12px; }
  .topbar .filters { margin-left: auto; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .topbar label { font-size: 12px; color: var(--muted); margin-right: 4px; }

  .content { padding: 24px 28px; }

  /* ----- Common form/input ----- */
  select, input[type="number"], input[type="month"], input[type="text"], input[type="date"] {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: white;
    font-family: inherit;
  }
  button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    background: var(--primary);
    color: white;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  button:hover { background: var(--primary-dark); }
  button.ghost { background: white; color: var(--primary); border: 1px solid var(--border); }
  button.ghost:hover { background: #f3f4f6; }
  button.danger { background: var(--danger); }
  button.danger:hover { background: #dc2626; }
  button.sm { padding: 4px 10px; font-size: 12px; }

  /* ----- Cards / KPI ----- */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .kpi-card {
    background: var(--card);
    padding: 16px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 22px; font-weight: 700; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .kpi-sub.up { color: var(--success); }
  .kpi-sub.down { color: var(--danger); }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 20px;
  }
  @media (max-width: 1000px) { .grid-2 { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 18px 20px;
  }
  .card h2 { margin: 0 0 14px; font-size: 14px; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--border); }
  th { font-weight: 600; color: var(--muted); font-size: 11px; background: #fafbfc; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #fafbfc; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-grid label { display: flex; flex-direction: column; font-size: 11px; color: var(--muted); gap: 4px; }

  .empty { color: var(--muted); text-align: center; padding: 32px 12px; font-size: 13px; }
  .row-actions button { margin-left: 4px; }
  .note {
    background: #fffbeb;
    border-left: 3px solid var(--warning);
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 12px;
    color: #78350f;
    margin-top: 16px;
  }
  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: #eef2ff;
    color: var(--primary);
  }

  .placeholder {
    background: white;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
  }
  .placeholder .big { font-size: 32px; margin-bottom: 10px; }
  .placeholder .title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .placeholder ul { text-align: left; max-width: 480px; margin: 16px auto 0; font-size: 13px; color: var(--text); }
</style>
</head>
<body>

<div class="app">

  <!-- =================== SIDEBAR =================== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">🏥 NAORU整体</div>
      <div class="sub">経営ダッシュボード</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">ダッシュボード</div>
      <div class="nav-item" data-view="summary"><span class="icon">📊</span>経営サマリー</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">売上管理</div>
      <div class="nav-item" data-view="revenue-entry"><span class="icon">📝</span>月次売上入力</div>
      <div class="nav-item" data-view="revenue-list"><span class="icon">📋</span>売上一覧</div>
      <div class="nav-item" data-view="revenue-trend"><span class="icon">📈</span>売上推移</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">広告・集客</div>
      <div class="nav-item" data-view="ad-cost"><span class="icon">💰</span>広告費管理</div>
      <div class="nav-item" data-view="channel"><span class="icon">📣</span>集客チャネル</div>
      <div class="nav-item" data-view="cpa-roas"><span class="icon">🎯</span>CPA / ROAS分析</div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">予約管理</div>
      <div class="nav-item" data-view="reservation-list"><span class="icon">📅</span>予約一覧<span class="badge-sm">準備中</span></div>
      <div class="nav-item" data-view="reservation-calendar"><span class="icon">🗓️</span>カレンダー<span class="badge-sm">準備中</span></div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">顧客管理</div>
      <div class="nav-item" data-view="customers"><span class="icon">👥</span>顧客一覧<span class="badge-sm">準備中</span></div>
      <div class="nav-item" data-view="line"><span class="icon">💬</span>LINEチャット<span class="badge-sm">準備中</span></div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">マスタ管理</div>
      <div class="nav-item" data-view="clinics"><span class="icon">🏥</span>店舗</div>
      <div class="nav-item" data-view="staff"><span class="icon">🧑‍⚕️</span>スタッフ<span class="badge-sm">準備中</span></div>
      <div class="nav-item" data-view="menu"><span class="icon">🍽️</span>メニュー<span class="badge-sm">準備中</span></div>
    </div>

    <div class="nav-group">
      <div class="nav-group-title">設定</div>
      <div class="nav-item" data-view="data"><span class="icon">⚙️</span>データ管理</div>
    </div>
  </aside>

  <!-- =================== MAIN =================== -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1 id="viewTitle">経営サマリー</h1>
        <div class="crumb" id="viewCrumb">ダッシュボード / 経営サマリー</div>
      </div>
      <div class="filters" id="globalFilters">
        <label>店舗</label>
        <select id="clinicSelect">
          <option value="all">全店舗合算</option>
          <option value="nakamozu">中百舌鳥院</option>
          <option value="tenrokuten">天満天六院</option>
        </select>
        <label>期間</label>
        <select id="periodSelect"></select>
        <input type="month" id="fromMonth" />
        <span style="color: var(--muted); font-size: 12px;">〜</span>
        <input type="month" id="toMonth" />
      </div>
    </div>
    <div class="content" id="viewContent"></div>
  </main>
</div>

<script>
const CLINICS = {
  nakamozu: 'NAORU整体 中百舌鳥院',
  tenrokuten: 'NAORU整体 天満天六院',
};
const CHANNEL_LABELS = {
  google: 'Google広告',
  meta: 'Meta広告',
  hotpepper: 'ホットペッパー',
  referral: '口コミ・紹介',
  organic: '自然検索/MEO',
  other: 'その他',
};
const STORAGE_KEY = 'naoru_dashboard_v1';

let state = { entries: [] };
let currentView = 'summary';
const charts = {};

const VIEWS = {
  'summary':              { title: '経営サマリー',     crumb: 'ダッシュボード / 経営サマリー',         filters: true },
  'revenue-entry':        { title: '月次売上入力',     crumb: '売上管理 / 月次売上入力',                filters: false },
  'revenue-list':         { title: '売上一覧',         crumb: '売上管理 / 売上一覧',                    filters: true },
  'revenue-trend':        { title: '売上推移',         crumb: '売上管理 / 売上推移',                    filters: true },
  'ad-cost':              { title: '広告費管理',       crumb: '広告・集客 / 広告費管理',                filters: true },
  'channel':              { title: '集客チャネル',     crumb: '広告・集客 / 集客チャネル',              filters: true },
  'cpa-roas':             { title: 'CPA / ROAS分析',   crumb: '広告・集客 / CPA / ROAS分析',            filters: true },
  'reservation-list':     { title: '予約一覧',         crumb: '予約管理 / 予約一覧',                    filters: false },
  'reservation-calendar': { title: 'カレンダー',       crumb: '予約管理 / カレンダー',                  filters: false },
  'customers':            { title: '顧客一覧',         crumb: '顧客管理 / 顧客一覧',                    filters: false },
  'line':                 { title: 'LINEチャット',     crumb: '顧客管理 / LINEチャット',                filters: false },
  'clinics':              { title: '店舗マスタ',       crumb: 'マスタ管理 / 店舗',                      filters: false },
  'staff':                { title: 'スタッフ',         crumb: 'マスタ管理 / スタッフ',                  filters: false },
  'menu':                 { title: 'メニュー',         crumb: 'マスタ管理 / メニュー',                  filters: false },
  'data':                 { title: 'データ管理',       crumb: '設定 / データ管理',                      filters: false },
};

// ===== Persistence =====
function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { state = JSON.parse(raw); } catch(e) { state = { entries: [] }; } }
  if (!state.entries) state.entries = [];
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// ===== Entries =====
function entryKey(month, clinic) { return `${month}__${clinic}`; }
function upsertEntry(e) {
  const idx = state.entries.findIndex(x => entryKey(x.month, x.clinic) === entryKey(e.month, e.clinic));
  if (idx >= 0) state.entries[idx] = e;
  else state.entries.push(e);
  state.entries.sort((a,b) => a.month.localeCompare(b.month));
  save();
}
function deleteEntry(month, clinic) {
  state.entries = state.entries.filter(x => !(x.month === month && x.clinic === clinic));
  save();
  renderView();
}

// ===== Period filter =====
function pad2(n) { return String(n).padStart(2, '0'); }
function ymOf(d) { return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}`; }
function addMonths(d, n) { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; }

function populatePeriodSelect() {
  const sel = document.getElementById('periodSelect');
  const prev = sel.value;
  const today = new Date();
  const thisYear = today.getFullYear();
  const lastYear = thisYear - 1;
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const thisMonthLabel = `${thisYear}年${monthNames[today.getMonth()]}`;
  const lastMonthDate = addMonths(today, -1);
  const lastMonthLabel = `${lastMonthDate.getFullYear()}年${monthNames[lastMonthDate.getMonth()]}`;
  const dataYears = [...new Set(state.entries.map(e => e.month.slice(0,4)))];
  const years = [...new Set([thisYear, lastYear, ...dataYears.map(Number)])].sort((a,b) => b - a);

  sel.innerHTML = `
    <optgroup label="ショートカット">
      <option value="thisMonth">今月 (${thisMonthLabel})</option>
      <option value="lastMonth">先月 (${lastMonthLabel})</option>
      <option value="last3">直近3ヶ月</option>
      <option value="last6">直近6ヶ月</option>
    </optgroup>
    <optgroup label="年単位">
      ${years.map(y => `<option value="year:${y}">${y}年 (1月〜12月)</option>`).join('')}
    </optgroup>
    <optgroup label="その他">
      <option value="all">全期間</option>
      <option value="custom">カスタム範囲...</option>
    </optgroup>
  `;
  sel.value = prev || `year:${thisYear}`;
  if (!sel.value) sel.value = `year:${thisYear}`;
}

function getPeriodRange() {
  const period = document.getElementById('periodSelect').value;
  const today = new Date();
  const thisMonth = ymOf(today);
  const lastMonth = ymOf(addMonths(today, -1));
  if (period.startsWith('year:')) {
    const y = period.slice(5);
    return { from: `${y}-01`, to: `${y}-12` };
  }
  switch (period) {
    case 'thisMonth': return { from: thisMonth, to: thisMonth };
    case 'lastMonth': return { from: lastMonth, to: lastMonth };
    case 'last3':     return { from: ymOf(addMonths(today, -2)), to: thisMonth };
    case 'last6':     return { from: ymOf(addMonths(today, -5)), to: thisMonth };
    case 'all':       return { from: '', to: '' };
    case 'custom':    return {
      from: document.getElementById('fromMonth').value,
      to: document.getElementById('toMonth').value,
    };
  }
  return { from: '', to: '' };
}

function syncRangeInputs() {
  const { from, to } = getPeriodRange();
  const fromEl = document.getElementById('fromMonth');
  const toEl = document.getElementById('toMonth');
  const isCustom = document.getElementById('periodSelect').value === 'custom';
  if (!isCustom) { fromEl.value = from; toEl.value = to; }
  fromEl.disabled = !isCustom;
  toEl.disabled = !isCustom;
}

function filteredEntries() {
  const clinic = document.getElementById('clinicSelect').value;
  const { from, to } = getPeriodRange();
  return state.entries.filter(e => {
    if (clinic !== 'all' && e.clinic !== clinic) return false;
    if (from && e.month < from) return false;
    if (to && e.month > to) return false;
    return true;
  });
}

// ===== Format =====
function fmt(n) { return n.toLocaleString('ja-JP'); }
function yen(n) { return '¥' + fmt(Math.round(n)); }
function aggregate(entries) {
  const t = { revenue: 0, adspend: 0, newCustomers: 0, repeatVisits: 0, reservations: 0 };
  entries.forEach(e => {
    t.revenue += e.revenue;
    t.adspend += e.adspend;
    t.newCustomers += e.newCustomers;
    t.repeatVisits += e.repeatVisits;
    t.reservations += e.reservations;
  });
  return t;
}

// ===== Chart helper =====
function destroyChart(key) { if (charts[key]) { charts[key].destroy(); delete charts[key]; } }

// ===== Views =====
function viewSummary() {
  const entries = filteredEntries();
  const t = aggregate(entries);
  const cpa = t.newCustomers > 0 ? t.adspend / t.newCustomers : 0;
  const roas = t.adspend > 0 ? (t.revenue / t.adspend) * 100 : 0;
  const avgPerCust = (t.newCustomers + t.repeatVisits) > 0 ? t.revenue / (t.newCustomers + t.repeatVisits) : 0;

  return `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">合計売上</div><div class="kpi-value">${yen(t.revenue)}</div><div class="kpi-sub">${entries.length}件のデータ</div></div>
      <div class="kpi-card"><div class="kpi-label">広告費</div><div class="kpi-value">${yen(t.adspend)}</div></div>
      <div class="kpi-card"><div class="kpi-label">新規顧客</div><div class="kpi-value">${fmt(t.newCustomers)} 人</div></div>
      <div class="kpi-card"><div class="kpi-label">リピート来院</div><div class="kpi-value">${fmt(t.repeatVisits)} 人</div></div>
      <div class="kpi-card"><div class="kpi-label">CPA</div><div class="kpi-value">${yen(cpa)}</div><div class="kpi-sub">顧客獲得単価</div></div>
      <div class="kpi-card"><div class="kpi-label">ROAS</div><div class="kpi-value">${roas.toFixed(0)}%</div><div class="kpi-sub ${roas >= 300 ? 'up' : 'down'}">${roas >= 300 ? '良好' : '要改善 (目安300%以上)'}</div></div>
      <div class="kpi-card"><div class="kpi-label">客単価</div><div class="kpi-value">${yen(avgPerCust)}</div></div>
      <div class="kpi-card"><div class="kpi-label">予約数</div><div class="kpi-value">${fmt(t.reservations)}</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><h2>📈 月次売上推移</h2><canvas id="chart_summary_revenue" height="180"></canvas></div>
      <div class="card"><h2>💰 広告費 vs 新規顧客</h2><canvas id="chart_summary_ad" height="180"></canvas></div>
    </div>
  `;
}
function viewSummaryAfter() {
  const entries = filteredEntries();
  const months = [...new Set(entries.map(e => e.month))].sort();
  const clinic = document.getElementById('clinicSelect').value;
  const datasets = [];
  if (clinic === 'all') {
    Object.keys(CLINICS).forEach((cKey, i) => {
      datasets.push({
        label: CLINICS[cKey],
        data: months.map(m => { const e = entries.find(x => x.month === m && x.clinic === cKey); return e ? e.revenue : 0; }),
        backgroundColor: i === 0 ? '#2563eb' : '#7c3aed',
      });
    });
  } else {
    datasets.push({
      label: CLINICS[clinic],
      data: months.map(m => { const e = entries.find(x => x.month === m); return e ? e.revenue : 0; }),
      backgroundColor: '#2563eb',
    });
  }
  destroyChart('summary_revenue');
  charts.summary_revenue = new Chart(document.getElementById('chart_summary_revenue'), {
    type: 'bar', data: { labels: months, datasets },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { ticks: { callback: v => '¥' + (v/10000) + '万' } } } },
  });
  const adData = months.map(m => entries.filter(e => e.month === m).reduce((s,e) => s + e.adspend, 0));
  const newData = months.map(m => entries.filter(e => e.month === m).reduce((s,e) => s + e.newCustomers, 0));
  destroyChart('summary_ad');
  charts.summary_ad = new Chart(document.getElementById('chart_summary_ad'), {
    type: 'bar',
    data: { labels: months, datasets: [
      { type: 'bar', label: '広告費', data: adData, backgroundColor: '#f59e0b', yAxisID: 'y' },
      { type: 'line', label: '新規顧客', data: newData, borderColor: '#10b981', backgroundColor: '#10b981', yAxisID: 'y1', tension: 0.3 },
    ]},
    options: { responsive: true, plugins: { legend: { position: 'bottom' } },
      scales: { y: { position: 'left', ticks: { callback: v => '¥' + (v/10000) + '万' } }, y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { callback: v => v + '人' } } } },
  });
}

function viewRevenueEntry() {
  const today = new Date();
  const defaultMonth = ymOf(today);
  return `
    <div class="card">
      <h2>📝 月次データを追加・更新</h2>

function saveEntry() {
  const month = document.getElementById('f_month').value;
  if (!month) { alert('対象月を入力してください'); return; }
  upsertEntry({
    month,
    clinic: document.getElementById('f_clinic').value,
    revenue: Number(document.getElementById('f_revenue').value) || 0,
    adspend: Number(document.getElementById('f_adspend').value) || 0,
    newCustomers: Number(document.getElementById('f_new').value) || 0,
    repeatVisits: Number(document.getElementById('f_repeat').value) || 0,
    reservations: Number(document.getElementById('f_reservations').value) || 0,
    channel: document.getElementById('f_channel').value,
  });
  const msg = document.getElementById('saveMsg');
  if (msg) { msg.textContent = '✓ 保存しました'; setTimeout(() => msg.textContent = '', 2000); }
  renderView();
}
function editEntry(month, clinic) {
  switchView('revenue-entry');
  setTimeout(() => {
    const e = state.entries.find(x => x.month === month && x.clinic === clinic);
    if (!e) return;
    document.getElementById('f_month').value = e.month;
    document.getElementById('f_clinic').value = e.clinic;
    document.getElementById('f_revenue').value = e.revenue;
    document.getElementById('f_adspend').value = e.adspend;
    document.getElementById('f_new').value = e.newCustomers;
    document.getElementById('f_repeat').value = e.repeatVisits;
    document.getElementById('f_reservations').value = e.reservations;
    document.getElementById('f_channel').value = e.channel;
  }, 50);
}

function viewCpaRoasAfter() {
  const entries = filteredEntries();
  const months = [...new Set(entries.map(e => e.month))].sort();
  const cpaData = months.map(m => {
    const ms = entries.filter(e => e.month === m);
    const ad = ms.reduce((s,e) => s + e.adspend, 0);
    const nc = ms.reduce((s,e) => s + e.newCustomers, 0);
    return nc > 0 ? ad / nc : 0;
  });
  const roasData = months.map(m => {
    const ms = entries.filter(e => e.month === m);
    const ad = ms.reduce((s,e) => s + e.adspend, 0);
    const rv = ms.reduce((s,e) => s + e.revenue, 0);
    return ad > 0 ? (rv / ad) * 100 : 0;
  });
  destroyChart('cpa');
  charts.cpa = new Chart(document.getElementById('chart_cpa'), {
    data: { labels: months, datasets: [
      { type: 'bar', label: 'CPA (円)', data: cpaData, backgroundColor: '#f59e0b', yAxisID: 'y' },
      { type: 'line', label: 'ROAS (%)', data: roasData, borderColor: '#10b981', backgroundColor: '#10b981', yAxisID: 'y1', tension: 0.3 },

  });
}

// ===== Import / export / sample =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `naoru_dashboard_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importData(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) throw new Error('invalid format');
      state = data; save(); renderView(); alert('インポートしました');
    } catch(err) { alert('読み込みに失敗しました: ' + err.message); }
  };
  reader.readAsText(file);
}
function loadSample() {
  if (state.entries.length > 0 && !confirm('既存データを上書きします。よろしいですか？')) return;
  const months = ['2025-10','2025-11','2025-12','2026-01','2026-02','2026-03','2026-04','2026-05'];
  const sample = [];
  months.forEach((m, i) => {
    sample.push({
      month: m, clinic: 'nakamozu',
      revenue: 1200000 + i * 50000 + Math.floor(Math.random()*100000),
      adspend: 180000 + Math.floor(Math.random()*40000),
      newCustomers: 28 + Math.floor(Math.random()*10),
      repeatVisits: 95 + i * 5,
      reservations: 150 + i * 8,
      channel: ['google','meta','hotpepper'][i % 3],
    });
    sample.push({
      month: m, clinic: 'tenrokuten',
      revenue: 980000 + i * 40000 + Math.floor(Math.random()*80000),
      adspend: 150000 + Math.floor(Math.random()*30000),
      newCustomers: 22 + Math.floor(Math.random()*8),
      repeatVisits: 75 + i * 4,
      reservations: 120 + i * 6,
      channel: ['meta','google','referral'][i % 3],
    });
  });
  state.entries = sample; save(); renderView();
}
